name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  # Produces e.g. ghcr.io/syaifulazham/smarttutor
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/smarttutor

jobs:
  # ── Job 1: Build & push Docker images ──────────────────────────────────────
  build:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Server image ────────────────────────────────────────────────────────
      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/server:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/server:latest
          cache-from: type=gha,scope=server
          cache-to:   type=gha,scope=server,mode=max

      # ── Web (nginx) image ───────────────────────────────────────────────────
      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/web:latest
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max


  # ── Job 2: Deploy to VPS ───────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production   # optional: add approval gate in GitHub settings

    steps:
      - name: Checkout (for compose file & nginx config)
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || '22' }}
          source:   "docker-compose.prod.yml,nginx-smarttutor.conf"
          target:   /opt/smarttutor

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG:               ${{ needs.build.outputs.image_tag }}
          IMAGE_PREFIX:            ${{ env.IMAGE_PREFIX }}
          DOMAIN:                  ${{ secrets.DOMAIN }}
          POSTGRES_USER:           ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:       ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET:              ${{ secrets.JWT_SECRET }}
          SESSION_SECRET:          ${{ secrets.SESSION_SECRET }}
          FRONTEND_URL:            ${{ secrets.FRONTEND_URL }}
          GOOGLE_CLIENT_ID:        ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:    ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL:     ${{ secrets.GOOGLE_CALLBACK_URL }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:      ${{ secrets.ELEVENLABS_API_KEY }}
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_CERDAS_PRICE_ID:  ${{ secrets.STRIPE_CERDAS_PRICE_ID }}
          STRIPE_CEMERLANG_PRICE_ID: ${{ secrets.STRIPE_CEMERLANG_PRICE_ID }}
          SMTP_HOST:               ${{ secrets.SMTP_HOST }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_SECURE:             ${{ secrets.SMTP_SECURE }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASS:               ${{ secrets.SMTP_PASS }}
          SMTP_FROM:               ${{ secrets.SMTP_FROM }}
          GH_ACTOR:                ${{ github.actor }}
          GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || '22' }}
          envs: >
            IMAGE_TAG,IMAGE_PREFIX,DOMAIN,
            POSTGRES_USER,POSTGRES_PASSWORD,
            JWT_SECRET,SESSION_SECRET,FRONTEND_URL,
            GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_CALLBACK_URL,
            GEMINI_API_KEY,ELEVENLABS_API_KEY,
            STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,
            STRIPE_CERDAS_PRICE_ID,STRIPE_CEMERLANG_PRICE_ID,
            SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASS,SMTP_FROM,
            GH_ACTOR,GH_TOKEN
          script: |
            set -e
            cd /opt/smarttutor

            # ── Write .env for docker-compose ──────────────────────────────
            cat > .env <<EOF
            SERVER_IMAGE=${IMAGE_PREFIX}/server:${IMAGE_TAG}
            WEB_IMAGE=${IMAGE_PREFIX}/web:${IMAGE_TAG}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            SESSION_SECRET=${SESSION_SECRET}
            FRONTEND_URL=${FRONTEND_URL}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            STRIPE_CERDAS_PRICE_ID=${STRIPE_CERDAS_PRICE_ID}
            STRIPE_CEMERLANG_PRICE_ID=${STRIPE_CEMERLANG_PRICE_ID}
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_SECURE=${SMTP_SECURE}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            SMTP_FROM=${SMTP_FROM}
            EOF

            # ── Install nginx site config (first deploy only if not exists) ─
            NGINX_CONF=/etc/nginx/sites-available/smarttutor
            if [ ! -f "$NGINX_CONF" ]; then
              sed "s/DOMAIN_PLACEHOLDER/${DOMAIN}/g" /opt/smarttutor/nginx-smarttutor.conf \
                | sudo tee "$NGINX_CONF" > /dev/null
              sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/smarttutor
              sudo nginx -t && sudo systemctl reload nginx
            fi

            # ── Login to ghcr.io ───────────────────────────────────────────
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            # ── Pull new images ────────────────────────────────────────────
            docker compose -f docker-compose.prod.yml pull

            # ── Ensure postgres is up and healthy before migrating ─────────
            docker compose -f docker-compose.prod.yml up -d postgres
            echo "Waiting for PostgreSQL to be ready..."
            for i in $(seq 1 12); do
              docker compose -f docker-compose.prod.yml exec -T postgres \
                pg_isready -U "${POSTGRES_USER}" -d smarttutor && break
              sleep 5
            done

            # ── Run Prisma migrations (one-shot, then removed) ─────────────
            docker compose -f docker-compose.prod.yml run --rm server \
              npx prisma migrate deploy

            # ── Start / restart all services ───────────────────────────────
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── Remove dangling images ─────────────────────────────────────
            docker image prune -f

            echo "✅ Deployed ${IMAGE_TAG} successfully"
